<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="1400" height="700">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Z gradient - electric cyan -->
    <linearGradient id="z-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <!-- Z overlay gradient for depth -->
    <linearGradient id="z-overlay" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Displacement lines gradient -->
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="20%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.06"/>
      <stop offset="80%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="line-fade-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <!-- Z glow filter -->
    <filter id="z-glow-heavy">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <filter id="glow-hard">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>

    <!-- Matrix rain -->
    <linearGradient id="rain-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip for Z -->
    <clipPath id="z-clip">
      <polygon points="0,0 1400,0 1400,700 0,700"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1400" height="700" fill="url(#bg-glow)"/>

  <!-- === SCANLINE GRID === -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="50" x2="1400" y2="50"/>
    <line x1="0" y1="100" x2="1400" y2="100"/>
    <line x1="0" y1="150" x2="1400" y2="150"/>
    <line x1="0" y1="200" x2="1400" y2="200"/>
    <line x1="0" y1="250" x2="1400" y2="250"/>
    <line x1="0" y1="300" x2="1400" y2="300"/>
    <line x1="0" y1="350" x2="1400" y2="350"/>
    <line x1="0" y1="400" x2="1400" y2="400"/>
    <line x1="0" y1="450" x2="1400" y2="450"/>
    <line x1="0" y1="500" x2="1400" y2="500"/>
    <line x1="0" y1="550" x2="1400" y2="550"/>
    <line x1="0" y1="600" x2="1400" y2="600"/>
    <line x1="0" y1="650" x2="1400" y2="650"/>
    <!-- Vertical grid -->
    <line x1="100" y1="0" x2="100" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="700"/>
    <line x1="300" y1="0" x2="300" y2="700"/>
    <line x1="400" y1="0" x2="400" y2="700"/>
    <line x1="500" y1="0" x2="500" y2="700"/>
    <line x1="600" y1="0" x2="600" y2="700"/>
    <line x1="700" y1="0" x2="700" y2="700"/>
    <line x1="800" y1="0" x2="800" y2="700"/>
    <line x1="900" y1="0" x2="900" y2="700"/>
    <line x1="1000" y1="0" x2="1000" y2="700"/>
    <line x1="1100" y1="0" x2="1100" y2="700"/>
    <line x1="1200" y1="0" x2="1200" y2="700"/>
    <line x1="1300" y1="0" x2="1300" y2="700"/>
  </g>

  <!-- === BACKGROUND MATRIX RAIN === -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#22d3ee" opacity="0.06">
    <text x="50" y="60">01101</text>
    <text x="150" y="130">10010</text>
    <text x="250" y="200">11001</text>
    <text x="350" y="90">00110</text>
    <text x="450" y="170">10101</text>
    <text x="550" y="250">01011</text>
    <text x="650" y="120">11100</text>
    <text x="750" y="190">00011</text>
    <text x="850" y="260">10110</text>
    <text x="950" y="140">01110</text>
    <text x="1050" y="210">11010</text>
    <text x="1150" y="100">00101</text>
    <text x="1250" y="170">10001</text>
    <text x="1350" y="240">01010</text>
    <text x="80" y="380">0011</text>
    <text x="180" y="450">1100</text>
    <text x="280" y="520">1001</text>
    <text x="380" y="390">0110</text>
    <text x="480" y="460">1010</text>
    <text x="580" y="530">0100</text>
    <text x="680" y="400">1110</text>
    <text x="780" y="470">0001</text>
    <text x="880" y="540">1011</text>
    <text x="980" y="410">1101</text>
    <text x="1080" y="480">0111</text>
    <text x="1180" y="550">1000</text>
    <text x="1280" y="420">0101</text>
    <text x="1380" y="490">0010</text>
  </g>

  <!-- === LEFT SIDE: VERTICAL CODE STRIPS === -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#334155" opacity="0.5">
    <text x="30" y="280">pub struct Zeta {</text>
    <text x="40" y="296">  version: SemVer,</text>
    <text x="40" y="312">  backend: LLVM,</text>
    <text x="40" y="328">  mir: MirStage,</text>
    <text x="30" y="344">}</text>
  </g>

  <g font-family="'Courier New', monospace" font-size="11" fill="#334155" opacity="0.35">
    <text x="30" y="480">fn compile(src: &str) {</text>
    <text x="40" y="496">  let ast = parse(src);</text>
    <text x="40" y="512">  let mir = lower(ast);</text>
    <text x="40" y="528">  let llvm = codegen(mir);</text>
    <text x="30" y="544">}</text>
  </g>

  <!-- === RIGHT SIDE: VERTICAL CODE STRIPS === -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#334155" opacity="0.5">
    <text x="1200" y="280">fn optimized() -> bool {</text>
    <text x="1210" y="296">  self.simd.available()</text>
    <text x="1210" y="312">  && self.abi.stable()</text>
    <text x="1210" y="328">  && self.ctfe.pass()</text>
    <text x="1200" y="344">}</text>
  </g>

  <g font-family="'Courier New', monospace" font-size="11" fill="#334155" opacity="0.35">
    <text x="1200" y="480">native_target!("avx512")</text>
    <text x="1200" y="496">trait Serialize[T] {</text>
    <text x="1210" y="512">  fn encode(val: T) -> []i64</text>
    <text x="1200" y="528">}</text>
  </g>

  <!-- === AMBIENT LIGHT BARS === -->
  <g opacity="0.03">
    <rect x="50" y="200" width="5" height="300" fill="#22d3ee" rx="2.5"/>
    <rect x="1345" y="200" width="5" height="300" fill="#22d3ee" rx="2.5"/>
  </g>

  <!-- === TOP/BOTTOM AMBIENT LINES === -->
  <rect x="0" y="0" width="1400" height="1" fill="url(#line-fade)"/>
  <rect x="0" y="699" width="1400" height="1" fill="url(#line-fade)"/>
  <rect x="0" y="0" width="1" height="700" fill="url(#line-fade-v)"/>
  <rect x="1399" y="0" width="1" height="700" fill="url(#line-fade-v)"/>

  <!-- === CORNER BRACKETS === -->
  <g stroke="#22d3ee" stroke-width="2" opacity="0.25" fill="none">
    <path d="M 30 30 L 70 30 L 70 20"/>
    <path d="M 1370 30 L 1330 30 L 1330 20"/>
    <path d="M 30 670 L 70 670 L 70 680"/>
    <path d="M 1370 670 L 1330 670 L 1330 680"/>
  </g>

  <!-- === CENTRAL CONTENT GROUP === -->
  <g transform="translate(700, 320)">

    <!-- === THE Z === -->
    <!-- Outer glow -->
    <text font-family="'Inter', 'Helvetica Neue', sans-serif"
          font-size="340" font-weight="900" fill="none"
          stroke="#22d3ee" stroke-width="2" opacity="0.08"
          text-anchor="middle" dominant-baseline="central"
          letter-spacing="-15">Z</text>

    <!-- Main Z with glow -->
    <g filter="url(#z-glow-heavy)">
      <text font-family="'Inter', 'Helvetica Neue', sans-serif"
            font-size="340" font-weight="900"
            fill="url(#z-main)"
            text-anchor="middle" dominant-baseline="central"
            letter-spacing="-15">Z</text>
    </g>

    <!-- Z highlight overlay -->
    <text font-family="'Inter', 'Helvetica Neue', sans-serif"
          font-size="340" font-weight="900"
          fill="url(#z-overlay)"
          text-anchor="middle" dominant-baseline="central"
          letter-spacing="-15">Z</text>

    <!-- Subtle Z outline -->
    <text font-family="'Inter', 'Helvetica Neue', sans-serif"
          font-size="340" font-weight="900" fill="none"
          stroke="#22d3ee" stroke-width="0.5" opacity="0.3"
          text-anchor="middle" dominant-baseline="central"
          letter-spacing="-15">Z</text>

    <!-- === HORIZONTAL ACCENT LINE === -->
    <rect x="-200" y="45" width="400" height="1" fill="#22d3ee" opacity="0.2"/>

    <!-- === SUBTITLE === -->
    <text font-family="'Inter', 'SF Mono', 'Helvetica Neue', sans-serif"
          font-size="14" font-weight="400"
          fill="#64748b" text-anchor="middle" letter-spacing="6"
          y="75" text-transform="uppercase">BUILD. RELEASE. OPTIMIZE.</text>

    <!-- === AUTHOR === -->
    <text font-family="'Inter', 'SF Mono', 'Helvetica Neue', sans-serif"
          font-size="11" font-weight="300"
          fill="#475569" text-anchor="middle" letter-spacing="3"
          y="95">BY ROY MURPHY  •  PHD COMPUTER SCIENCE</text>
  </g>

  <!-- === LINEAR DECORATIVE ELEMENTS === -->
  <!-- Connecting lines from left to Z -->
  <g stroke="#22d3ee" stroke-width="0.5" opacity="0.08" fill="none">
    <path d="M 200 320 L 400 320"/>
    <path d="M 400 300 L 500 300"/>
    <path d="M 400 340 L 500 340"/>
  </g>

  <!-- Connecting lines from Z to right -->
  <g stroke="#22d3ee" stroke-width="0.5" opacity="0.08" fill="none">
    <path d="M 1000 320 L 1200 320"/>
    <path d="M 900 300 L 1000 300"/>
    <path d="M 900 340 L 1000 340"/>
  </g>

  <!-- === VERSIONS BAR (bottom) === -->
  <g transform="translate(700, 600)">
    <text font-family="'Courier New', monospace" font-size="10" fill="#334155" text-anchor="middle" opacity="0.6">
      zeta v0.9.18  •  llvm 19  •  self-hosted: 51/51
    </text>
  </g>

</svg>
